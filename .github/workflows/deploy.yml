name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          set -x
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_B64 }}" | base64 -d > ~/.ssh/id_rsa
          echo "Decoded key"
      
          chmod 600 ~/.ssh/id_rsa
          echo "Permissions set"
      
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          echo "Host key added"
          
      - name: Deploy via rsync
        run: |
          rsync -avZ \
            --exclude='.git*' \
            --exclude='.github' \
            --exclude='.well-known' \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_PATH }}
